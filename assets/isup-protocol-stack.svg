<svg xmlns="http://www.w3.org/2000/svg" width="360" height="240" viewBox="0 0 360 240" role="img" aria-labelledby="title desc">
  <title id="title">ISUP protocol stack</title>
  <desc id="desc">A simple layered diagram showing ISUP over MTP3 over M2PA and M3UA over SCTP over IP.</desc>
  <rect width="360" height="240" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">
    <rect x="90" y="16" width="180" height="32" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="180" y="37" fill="#7c2d12">ISUP</text>

    <rect x="90" y="58" width="180" height="32" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="180" y="79" fill="#1e3a8a">MTP3</text>

    <rect x="36" y="100" width="132" height="32" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="102" y="121" fill="#14532d">M2PA</text>

    <rect x="192" y="100" width="132" height="32" rx="6" fill="#e0e7ff" stroke="#4f46e5"/>
    <text x="258" y="121" fill="#312e81">M3UA</text>

    <rect x="90" y="142" width="180" height="32" rx="6" fill="#f3e8ff" stroke="#9333ea"/>
    <text x="180" y="163" fill="#581c87">SCTP</text>

    <rect x="90" y="184" width="180" height="32" rx="6" fill="#f1f5f9" stroke="#334155"/>
    <text x="180" y="205" fill="#0f172a">IP</text>
  </g>
</svg>
